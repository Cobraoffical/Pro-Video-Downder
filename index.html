<!DOCTYPE html>

<title>Pro Video Downloader</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
background-size:300% 300%;
animation:bg 8s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:380px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.12);

}

.logo{
width:110px;
height:110px;
border-radius:25px;
margin-bottom:15px;
box-shadow:0 0 20px rgba(255,255,255,.25);
}

h1{
color:#fff;
margin-bottom:8px;
font-size:28px;
}

p{
color:#ddd;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:15px;
font-size:23px;
font-weight:bold;
color:#fff;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.fb{
background:#1877F2;
}

.tt{
background:#000;
}

.yt{
background:#FF0000;
}

.guide{
background:#8B5CF6;
}
</style>
</head>

<body>

<div class="card">

<img src="splash.png" class="logo">

<h1>Pro Video Downloader</h1>

<p>Facebook • TikTok • YouTube</p>

<button class="fb"
